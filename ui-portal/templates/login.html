<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Predictive Maintenance Portal</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h2>Welcome Back</h2>
                <p>Log in to access your maintenance portal</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group" style="animation: cascadeIn 0.8s var(--ease-spring) 0.1s both;">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" class="form-input" placeholder="Enter 'admin'" required autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group" style="animation: cascadeIn 0.8s var(--ease-spring) 0.2s both;">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter 'password123'" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" style="animation: cascadeIn 0.8s var(--ease-spring) 0.3s both;">Continue to Dashboard</button>
                
                <div class="micro-copy" style="animation: cascadeIn 0.8s var(--ease-spring) 0.4s both;">
                    <a href="#">Forgot your password?</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
