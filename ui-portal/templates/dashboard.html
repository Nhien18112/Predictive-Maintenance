<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Maintenance</title>
    <meta name="description" content="Unified dashboard for Predictive Maintenance (PDM) and Prognostics and Health Management (PHM).">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="logo-text">Acme<br><span>Maintenance</span></h1>
            </div>
            
            <nav class="primary-nav">
                <button class="nav-btn active" data-topic="pdm" style="animation: cascadeIn 0.6s var(--ease-spring) 0.1s both;">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </span>
                    PDM Overview
                </button>
                <button class="nav-btn" data-topic="phm" style="animation: cascadeIn 0.6s var(--ease-spring) 0.2s both;">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    </span>
                    PHM Diagnostics
                </button>
            </nav>

            <div class="sidebar-footer" style="animation: cascadeIn 0.6s var(--ease-spring) 0.3s both;">
                <p>{{ username }}</p>
                <a href="{{ url_for('logout') }}" class="logout-btn">Sign out</a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles">
                    <h2 id="topic-title">Predictive Maintenance</h2>
                    <p id="topic-subtitle">Real-time sensor telemetry and anomaly detection</p>
                </div>
                
                <!-- Secondary Tabs -->
                <div class="secondary-tabs">
                    <button class="subtab-btn active" data-tool="grafana">
                        Grafana Focus
                    </button>
                    <button class="subtab-btn" data-tool="superset">
                        Superset Detail
                    </button>
                </div>
            </header>

            <!-- Dashboard Iframe Container -->
            <section class="dashboard-container theme-pdm">
                <div class="iframe-wrapper loader-bg">
                    <iframe id="dashboard-frame" 
                            src="http://localhost:3000/d/pdm-overview/pdm-gold-overview?kiosk" 
                            frameborder="0" 
                            allowfullscreen>
                    </iframe>
                </div>
            </section>
        </main>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
